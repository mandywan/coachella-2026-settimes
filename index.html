<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --text: #342c29;

    --soft: #aea39d;
    --line: rgba(133, 109, 96, 0.12);
    --line-soft: rgba(133, 109, 96, 0.07);

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);

    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .top-bar { flex-shrink: 0; padding: 8px 12px 4px; }
  .top-bar-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .top-bar h1 { font-size: 13px; font-weight: 800; letter-spacing: 0.7px; color: #2e2623; }
  .controls { display: flex; align-items: center; gap: 6px; }
  .time-format {
    display: inline-flex;
    gap: 3px;
    background: #f3f3f3;
    border-radius: 7px;
    padding: 2px;
  }
  .tf-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 7px;
    border-radius: 5px;
    cursor: pointer;
  }
  .tf-btn.active {
    background: #666;
    color: #fff;
  }
  .sched-mode {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #f3f3f3;
    border-radius: 7px;
    padding: 2px 3px 2px 7px;
    min-height: 25px;
  }
  .sched-mode-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);

  }
  .sched-mode-btn {
    border: none;
    background: #d6d6d6;
    color: #666;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 7px;

    cursor: pointer;

  .sched-mode-btn.active {
    background: #666;
    color: #fff;
  }
  .day-tabs { flex-shrink: 0; display: flex; gap: 6px; padding: 0 12px 6px; }
  .day-tab {
    flex: 1;
    padding: 5px 0;
    border-radius: 8px;
    border: none;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    background: #f0f0f0;
    color: #999;
    line-height: 1.15;
  }
  .day-tab.active {
    background: #666;
    color: #fff;
  }
  .day-tab small { display: block; font-size: 9px; font-weight: 500; opacity: 0.9; margin-top: 1px; }
  .sched-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    background: var(--panel);
  }
  .hdr-row {
    flex-shrink: 0;
    display: flex;
    overflow: hidden;
    padding-bottom: 2px;
  }
  .gutter-spacer { width: 26px; flex-shrink: 0; }

    flex-shrink: 0;

  .scol { flex-shrink: 0; position: relative; border-left: 0.5px solid #e8e8e8; }
  .hline { position: absolute; left: 0; right: 0; border-top: 1px solid var(--line); }
  .hline-half { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--line-soft); }
  .now-line { position: absolute; left: 0; right: 0; border-top: 2px solid #ff5a5f; pointer-events: none; z-index: 20; }

    width: 10px;
    height: 10px;

  }

function tm(t){const[h,m]=t.split(':').map(Number);return(h+12)*60+m;}
function f24(m){let h=Math.floor(m/60)%24;return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function f12(m){
  let h=Math.floor(m/60)%24;
  const mm=String(m%60).padStart(2,'0');
  const ap=h>=12?'PM':'AM';
  h=h%12||12;

}

}

const days=[fri,sat,sun];
const festivalDates=[
  {year:2026,month:4,day:10},
  {year:2026,month:4,day:11},
  {year:2026,month:4,day:12}
];
const festivalTimeZone='America/Los_Angeles';
const urlParams=new URLSearchParams(window.location.search);
const forceNowPreview=urlParams.get('previewNow')==='1';
const previewDayRaw=Number(urlParams.get('previewDay'));
const previewDayIndex=Number.isInteger(previewDayRaw)&&previewDayRaw>=0&&previewDayRaw<festivalDates.length?previewDayRaw:null;
const previewTimeRaw=urlParams.get('previewTime');
let mySchedule={};
try{mySchedule=JSON.parse(localStorage.getItem('mySchedule')||'{}');}catch(e){mySchedule={};}
let curDay=0;
let timeFormat=localStorage.getItem('timeFormat')==='24'?'24':'12';
let scheduleMode=localStorage.getItem('scheduleMode')==='on';
let currentLayout=null;
let nowIndicatorTimer=null;
let activeTooltipKey=null;

function fmtTime(m){return timeFormat==='12'?f12(m):f24(m);}

function getFestivalDateTimeParts(now=new Date()){
  return new Intl.DateTimeFormat('en-US',{
    timeZone:festivalTimeZone,
    year:'numeric',
    month:'numeric',
    day:'numeric',
    hour:'numeric',
    minute:'numeric',
    hourCycle:'h23'
  }).formatToParts(now).reduce((acc,part)=>{
    if(part.type!=='literal') acc[part.type]=Number(part.value);
    return acc;
  },{});
}

function getForcedPreviewNow(baseNow=new Date()){
  if(!forceNowPreview) return null;
  const targetDay=previewDayIndex??0;
  const base=festivalDates[targetDay];
  let hour=21;
  let minute=0;

  if(previewTimeRaw&&/^\d{1,2}:\d{2}$/.test(previewTimeRaw)){
    const [h,m]=previewTimeRaw.split(':').map(Number);
    if(h>=0&&h<=23&&m>=0&&m<=59){
      hour=h;
      minute=m;
    }
  }

  const pad=n=>String(n).padStart(2,'0');
  const laLikeIso=`${base.year}-${pad(base.month)}-${pad(base.day)}T${pad(hour)}:${pad(minute)}:00-07:00`;
  const forced=new Date(laLikeIso);
  return Number.isNaN(forced.getTime())?baseNow:forced;
}

function syncTimeFormatUI(){
  const b24=document.getElementById('tf-24');
  const b12=document.getElementById('tf-12');
  if(!b24||!b12) return;
  b24.classList.toggle('active',timeFormat==='24');
  b12.classList.toggle('active',timeFormat==='12');
}

function syncScheduleModeUI(){
  const btn=document.getElementById('sched-mode-toggle');
  if(!btn) return;
  btn.classList.toggle('active',scheduleMode);
  btn.textContent=scheduleMode?'On':'Off';
}

function setTimeFormat(v){
  if(v!=='12'&&v!=='24') return;
  timeFormat=v;
  localStorage.setItem('timeFormat',v);
  syncTimeFormatUI();
  build(days[curDay]);
}

function toggleScheduleMode(){
  scheduleMode=!scheduleMode;
  localStorage.setItem('scheduleMode',scheduleMode?'on':'off');
  syncScheduleModeUI();
  hideSetTooltip();
  build(days[curDay]);
}

function getFestivalDayIndex(now=new Date()){
  const parts=getFestivalDateTimeParts(now);

  return festivalDates.findIndex(date=>
    date.year===parts.year &&
    date.month===parts.month &&
    date.day===parts.day
  );
}

function clearNowIndicator(){
  document.getElementById('now-line')?.remove();
  document.getElementById('now-label')?.remove();
}

function updateNowIndicator(now=new Date()){
  const effectiveNow=getForcedPreviewNow(now)??now;

  if(!currentLayout){
    clearNowIndicator();
    return;
  }

  const dayIndex=previewDayIndex??getFestivalDayIndex(effectiveNow);
  if(dayIndex!==curDay){
    clearNowIndicator();
    return;
  }

  const parts=getFestivalDateTimeParts(effectiveNow);
  const nowMinutes=parts.hour*60+parts.minute;
  const {s0,e0,ppm}=currentLayout;

  if(nowMinutes<s0||nowMinutes>e0){
    clearNowIndicator();
    return;
  }

  const top=(nowMinutes-s0)*ppm;
  const inner=document.getElementById('stages-inner');
  const gutter=document.getElementById('time-gutter');
  let line=document.getElementById('now-line');
  let label=document.getElementById('now-label');

  if(!line){
    line=document.createElement('div');
    line.id='now-line';
    line.className='now-line';
    inner.appendChild(line);
  }

  if(!label){
    label=document.createElement('div');
    label.id='now-label';
    label.className='now-label';
    gutter.appendChild(label);
  }

  line.style.top=top+'px';
  label.style.top=top+'px';
  label.textContent=fmtTime(nowMinutes);
}

function startNowIndicatorTimer(){
  if(nowIndicatorTimer) clearInterval(nowIndicatorTimer);
  nowIndicatorTimer=setInterval(()=>updateNowIndicator(),30000);
}

function setKey(dayIdx,s){return dayIdx+'|'+s[0]+'|'+s[2]+'|'+s[1];}

function applyPickedState(){
  const allSets=document.querySelectorAll('#stages-inner .set[data-key]');
  const hasPicks=scheduleMode&&[...allSets].some(el=>mySchedule[el.dataset.key]);
  allSets.forEach(el=>{
    const picked=!!mySchedule[el.dataset.key];
    el.classList.toggle('greyed',scheduleMode&&hasPicks&&!picked);
    const btn=el.querySelector('.pick-btn');
    if(btn){
      btn.classList.toggle('on',picked);
      btn.classList.toggle('hidden',!scheduleMode);
      btn.textContent=picked?'✓':'+';
    }
  });
}

function togglePick(k){
  if(mySchedule[k])delete mySchedule[k];
  else mySchedule[k]=true;
  localStorage.setItem('mySchedule',JSON.stringify(mySchedule));
  applyPickedState();
}

function hideSetTooltip(){
  const tip=document.getElementById('set-tip');
  if(!tip) return;
  tip.classList.add('hidden');
  tip.classList.remove('below');
  activeTooltipKey=null;
}

function showSetTooltip(card,title,timeRange){
  const tip=document.getElementById('set-tip');
  const titleEl=document.getElementById('set-tip-title');
  const timeEl=document.getElementById('set-tip-time');
  if(!tip||!titleEl||!timeEl) return;

  if(activeTooltipKey===card.dataset.key&&!tip.classList.contains('hidden')){
    hideSetTooltip();
    return;
  }

  titleEl.textContent=title;
  timeEl.textContent=timeRange;
  tip.classList.remove('hidden');
  tip.classList.remove('below');

  const rect=card.getBoundingClientRect();
  const margin=10;
  const tipRect=tip.getBoundingClientRect();
  let left=rect.left+(rect.width/2)-(tipRect.width/2);
  left=Math.max(margin,Math.min(left,window.innerWidth-tipRect.width-margin));

  let top=rect.top-tipRect.height-10;
  if(top<margin){
    top=Math.min(window.innerHeight-tipRect.height-margin,rect.bottom+10);
    tip.classList.add('below');
  }

  tip.style.left=left+'px';
  tip.style.top=top+'px';
  activeTooltipKey=card.dataset.key;
}

function build(sets){
  hideSetTooltip();
  const allM=sets.flatMap(s=>[tm(s[2]),tm(s[3])]);
  const s0=Math.floor(Math.min(...allM)/60)*60;
  const e0=Math.ceil(Math.max(...allM)/60)*60;
  const total=e0-s0;

  const scroll=document.getElementById('stages-scroll');
  const avH=scroll.clientHeight||600;
  const ppm=avH/total;
  const totPx=total*ppm;

  const avW=window.innerWidth-36;
  const colW=Math.max(60,Math.floor(avW/7));
  const fs=colW<66?8:9;
  currentLayout={s0,e0,ppm,totPx,colW};

  // headers
  const hc=document.getElementById('stage-hdrs');
  hc.innerHTML='';
  hc.style.width=`${colW*8}px`;
  hc.style.transform='translateX(0px)';
  stages.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='shdr';
    d.style.cssText=`width:${colW}px;background:${hdrBg[i]};`;
    d.textContent=s;
    hc.appendChild(d);
  });

  // time gutter
  const tg=document.getElementById('time-gutter');
  tg.style.height=totPx+'px';
  tg.innerHTML='';
  for(let m=s0;m<=e0;m+=60){
    let top=(m-s0)*ppm;
    if (m===s0) top+=6;
    if (m===e0) top-=6;
    const l=document.createElement('div');
    l.className='tlbl';
    l.style.top=top+'px';
    l.innerHTML=axisTime(m);
    tg.appendChild(l);
  }

  // stages
  const inner=document.getElementById('stages-inner');
  inner.innerHTML='';
  inner.style.cssText=`height:${totPx}px;width:${colW*8}px;`;

  for(let si=0;si<8;si++){
    const col=document.createElement('div');
    col.className='scol';
    col.style.cssText=`width:${colW}px;height:${totPx}px;`;
    for(let m=s0;m<=e0;m+=60){
      const ln=document.createElement('div');
      ln.className='hline';
      ln.style.top=((m-s0)*ppm)+'px';
      col.appendChild(ln);

      if (m < e0) {
        const half = document.createElement('div');
        half.className = 'hline-half';
        half.style.top = ((m - s0 + 30) * ppm) + 'px';
        col.appendChild(half);
      }
    }
    sets.filter(s=>s[0]===si).forEach(s=>{
      const sm=tm(s[2]),em=tm(s[3]);
      const top=(sm-s0)*ppm;
      const h=Math.max((em-sm)*ppm-1,12);
      const k=setKey(curDay,s);
      const b=document.createElement('div');
      b.className='set '+clsMap[si];
      if(h<30) b.classList.add('compact');
      b.dataset.key=k;
      b.setAttribute('role','button');
      b.setAttribute('tabindex','0');
      b.setAttribute('aria-label',`${s[1]}, ${fmtTime(sm)} to ${fmtTime(em)}`);
      b.style.cssText=`top:${top}px;height:${h}px;font-size:${fs}px;`;
      b.innerHTML=`<div class="an">${s[1]}</div><div class="at">${fmtTime(sm)}–${fmtTime(em)}</div>`;
      b.addEventListener('click',e=>{
        e.stopPropagation();
        showSetTooltip(b,s[1],`${fmtTime(sm)}–${fmtTime(em)}`);
      });
      b.addEventListener('keydown',e=>{
        if(e.key==='Enter'||e.key===' '){
          e.preventDefault();
          showSetTooltip(b,s[1],`${fmtTime(sm)}–${fmtTime(em)}`);
        }
      });
      const btn=document.createElement('button');
      btn.className='pick-btn'+(mySchedule[k]?' on':'');
      if(!scheduleMode) btn.classList.add('hidden');
      btn.textContent=mySchedule[k]?'✓':'+';
      btn.addEventListener('click',e=>{e.stopPropagation();togglePick(k);});
      b.appendChild(btn);
      col.appendChild(b);
    });
    inner.appendChild(col);
  }

  scroll.scrollLeft=0;
  scroll.scrollTo(0,0);
  hc.style.transform=`translateX(-${scroll.scrollLeft}px)`;
  tg.style.transform=`translateY(-${scroll.scrollTop}px)`;
  scroll.onscroll=()=>{
    hideSetTooltip();
    document.getElementById('stage-hdrs').style.transform=`translateX(-${scroll.scrollLeft}px)`;
    document.getElementById('time-gutter').style.transform=`translateY(-${scroll.scrollTop}px)`;
  };
  updateNowIndicator();
  applyPickedState();
}

function showDay(i){
  hideSetTooltip();
  curDay=i;
  document.querySelectorAll('.day-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  build(days[i]);
}

window.addEventListener('load',()=>{
  syncTimeFormatUI();
  syncScheduleModeUI();
  const festivalDay=previewDayIndex??getFestivalDayIndex(getForcedPreviewNow()??new Date());
  showDay(festivalDay>=0?festivalDay:0);
  startNowIndicatorTimer();
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.set')&&!e.target.closest('.set-tip')) hideSetTooltip();
});
window.addEventListener('resize',()=>build(days[curDay]));
</script>
